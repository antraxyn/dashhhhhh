<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard Sanlucid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-8">
    
    <!-- Modal Login Admin -->
    <div id="loginOverlay" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 w-96 text-center shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-cyan-400">Otorisasi Sistem</h2>
            
            <input type="password" id="adminSecretKey" placeholder="Masukkan Kunci Rahasia Admin" class="w-full p-3 bg-gray-900 rounded border border-gray-600 mb-6 text-center focus:border-cyan-400 outline-none">
            
            <!-- API Key ImgBB disembunyikan secara rapi -->
            <input type="hidden" id="imgbbApiKey" value="9fdc55bc171417ff98147c12818dfbd9">
            
            <button onclick="loginAdmin()" class="w-full px-6 py-3 bg-cyan-600 rounded font-bold hover:bg-cyan-500 transition-colors shadow-lg">Masuk Dashboard</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto" id="mainDashboard" style="display: none;">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">Panel Kendali Katalog</h1>
            <button onclick="logoutAdmin()" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded font-bold text-sm shadow">Keluar</button>
        </div>
        
        <!-- Form Edit Produk -->
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 mb-8 shadow-lg">
            <h2 class="text-xl font-bold mb-4 flex items-center"><i class="fa-solid fa-pen-to-square mr-2"></i> Mode Edit: <span id="editTargetName" class="text-cyan-400 ml-2">Pilih produk di bawah</span></h2>
            
            <input type="hidden" id="editId">
            <input type="hidden" id="existingCoverUrl">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Kolom 1: Data Teks -->
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400 font-bold">Nama Produk</label>
                        <input type="text" id="editName" class="w-full p-2 bg-gray-700 rounded border border-gray-600 outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold">Harga (Rp)</label>
                        <input type="number" id="editPrice" class="w-full p-2 bg-gray-700 rounded border border-gray-600 outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold">Kategori</label>
                        <input type="text" id="editKategori" class="w-full p-2 bg-gray-700 rounded border border-gray-600 outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold">Status Produk</label>
                        <select id="editStatus" class="w-full p-2 bg-gray-700 rounded border border-gray-600 outline-none focus:border-cyan-400">
                            <option value="1">Aktif (Tampil di Toko)</option>
                            <option value="0">Draft (Disembunyikan)</option>
                        </select>
                    </div>
                </div>

                <!-- Kolom 2: Upload Foto -->
                <div class="space-y-4 flex flex-col h-full">
                    <label class="text-xs text-gray-400 font-bold">Ganti Foto Sampul (Opsional)</label>
                    <div class="flex items-start gap-4">
                        <div class="w-24 h-32 bg-gray-900 border border-gray-600 rounded flex-shrink-0 overflow-hidden relative">
                            <img id="previewImg" src="" class="w-full h-full object-cover">
                        </div>
                        <div class="flex flex-col justify-center gap-2">
                            <label class="cursor-pointer bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded border border-gray-500 text-sm font-medium transition text-center">
                                <i class="fa-solid fa-image mr-1"></i> Pilih Gambar Baru
                                <input type="file" id="uploadCoverInput" accept="image/*" onchange="previewSelectedImage(this)" class="hidden">
                            </label>
                            <p class="text-[10px] text-gray-500">*Biarkan kosong jika tidak ingin mengubah foto. Gambar akan otomatis diunggah ke ImgBB saat Anda menekan tombol simpan.</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-4">
                <label class="text-xs text-gray-400 font-bold">Deskripsi E-Book</label>
                <textarea id="editDesc" rows="5" class="w-full p-2 bg-gray-700 rounded border border-gray-600 outline-none focus:border-cyan-400"></textarea>
            </div>
            
            <button id="btnSubmitEdit" onclick="submitEdit()" class="mt-6 w-full px-6 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-lg font-bold hover:from-cyan-500 hover:to-blue-500 shadow-lg transition-all">Simpan Perubahan ke Database</button>
        </div>

        <!-- Tabel Daftar Produk -->
        <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg overflow-x-auto">
            <h2 class="text-xl font-bold mb-4">Gudang Database TiDB</h2>
            <table class="w-full text-left text-sm whitespace-nowrap">
                <thead>
                    <tr class="border-b border-gray-600 text-gray-400">
                        <th class="py-3 px-2">Cover</th>
                        <th class="py-3 px-2">Nama E-Book</th>
                        <th class="py-3 px-2">Harga</th>
                        <th class="py-3 px-2">Kategori</th>
                        <th class="py-3 px-2">Status</th>
                        <th class="py-3 px-2">Aksi</th>
                    </tr>
                </thead>
                <tbody id="productTable">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // URL API Render Anda
        const ADMIN_API_URL = "https://guleleng.onrender.com/api/admin"; 
        let globalProducts = [];

        function loginAdmin() {
            const secret = document.getElementById('adminSecretKey').value;
            const imgbbKey = document.getElementById('imgbbApiKey').value;
            
            if(!secret) return alert("Kunci Rahasia tidak boleh kosong!");

            localStorage.setItem('sanlucid_admin_secret', secret);
            localStorage.setItem('sanlucid_imgbb_key', imgbbKey);
            
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            loadProducts();
        }

        function logoutAdmin() {
            localStorage.removeItem('sanlucid_admin_secret');
            document.getElementById('mainDashboard').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminSecretKey').value = '';
        }

        window.onload = () => {
            const savedSecret = localStorage.getItem('sanlucid_admin_secret');
            const savedImgbb = localStorage.getItem('sanlucid_imgbb_key');
            if(savedSecret && savedImgbb) {
                document.getElementById('imgbbApiKey').value = savedImgbb;
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainDashboard').style.display = 'block';
                loadProducts();
            }
        };

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${localStorage.getItem('sanlucid_admin_secret')}`
            };
        }

        async function loadProducts() {
            try {
                const res = await fetch(`${ADMIN_API_URL}/products`, { headers: getHeaders() });
                
                if (res.status === 401) {
                    alert("Kunci Rahasia Salah! Sesi ditolak.");
                    logoutAdmin();
                    return;
                }

                if (!res.ok) {
                    throw new Error("Gagal mengambil data dari server");
                }

                globalProducts = await res.json();
                renderTable();
            } catch (err) {
                alert("Gagal terhubung ke Server Admin Render. Pastikan Server Rust Anda sudah berstatus Live!");
                console.error(err);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('productTable');
            tbody.innerHTML = '';
            
            globalProducts.forEach((p, index) => {
                const statusBadge = p.is_active === 1 
                    ? '<span class="bg-green-900 text-green-400 px-2 py-1 rounded text-xs">Aktif</span>' 
                    : '<span class="bg-red-900 text-red-400 px-2 py-1 rounded text-xs">Draft</span>';

                tbody.innerHTML += `
                    <tr class="border-b border-gray-700 hover:bg-gray-750 transition-colors">
                        <td class="py-2 px-2"><img src="${p.cover_url}" class="w-10 h-14 object-cover rounded"></td>
                        <td class="py-2 px-2 font-bold text-gray-200">${p.name}</td>
                        <td class="py-2 px-2 text-cyan-400">Rp ${p.price}</td>
                        <td class="py-2 px-2">${p.kategori}</td>
                        <td class="py-2 px-2">${statusBadge}</td>
                        <td class="py-2 px-2">
                            <button onclick="editMode(${index})" class="bg-gray-700 hover:bg-gray-600 text-cyan-400 px-3 py-1 rounded border border-gray-500 transition-colors font-bold">
                                <i class="fa-solid fa-pen"></i> Edit Detail
                            </button>
                        </td>
                    </tr>`;
            });
        }

        function editMode(index) {
            const p = globalProducts[index];
            document.getElementById('editTargetName').innerText = p.name;
            
            document.getElementById('editId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editKategori').value = p.kategori;
            document.getElementById('editStatus').value = p.is_active;
            document.getElementById('existingCoverUrl').value = p.cover_url;
            document.getElementById('editDesc').value = p.deskripsi;
            
            document.getElementById('previewImg').src = p.cover_url;
            document.getElementById('uploadCoverInput').value = '';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function previewSelectedImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('previewImg').src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function submitEdit() {
            const id = document.getElementById('editId').value;
            if(!id) return alert("Pilih produk dari tabel terlebih dahulu!");

            const btn = document.getElementById('btnSubmitEdit');
            const fileInput = document.getElementById('uploadCoverInput');
            let finalCoverUrl = document.getElementById('existingCoverUrl').value;

            btn.disabled = true;

            if (fileInput.files.length > 0) {
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Mengunggah Foto ke ImgBB...';
                const imgbbKey = localStorage.getItem('sanlucid_imgbb_key');
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);

                try {
                    const uploadRes = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
                        method: 'POST',
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    
                    if (uploadData.success) {
                        finalCoverUrl = uploadData.data.url;
                    } else {
                        throw new Error("Gagal mendapat respon sukses dari ImgBB");
                    }
                } catch (e) {
                    alert("Error saat mengunggah gambar. Pastikan API Key ImgBB valid!");
                    btn.innerHTML = 'Simpan Perubahan ke Database';
                    btn.disabled = false;
                    return; 
                }
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Menyimpan ke TiDB...';
            
            const payload = {
                name: document.getElementById('editName').value,
                price: parseInt(document.getElementById('editPrice').value) || 0,
                kategori: document.getElementById('editKategori').value,
                cover_url: finalCoverUrl,
                is_active: parseInt(document.getElementById('editStatus').value),
                deskripsi: document.getElementById('editDesc').value,
            };

            try {
                const res = await fetch(`${ADMIN_API_URL}/products/${id}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("Sukses! Data produk berhasil diperbarui.");
                    loadProducts(); 
                    document.getElementById('editTargetName').innerText = "Pilih produk di bawah";
                    document.getElementById('editId').value = '';
                    document.getElementById('uploadCoverInput').value = '';
                } else {
                    const err = await res.text();
                    alert(`Gagal menyimpan: ${err}`);
                }
            } catch (err) {
                alert("Kesalahan jaringan saat menyimpan ke TiDB.");
            } finally {
                btn.innerHTML = 'Simpan Perubahan ke Database';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
